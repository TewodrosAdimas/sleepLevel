<!DOCTYPE html>
<html>
<head>
    <title>EEG AI Predictor</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #0f172a;
            color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .container { margin-top: 50px; }

        .card {
            background: #1e293b;
            border-radius: 15px;
            padding: 25px;
            border: 1px solid #334155;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        .result-box {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #334155;
        }

        .prediction-label { color: #38bdf8; font-weight: 600; }
        .confidence-label { color: #94a3b8; margin-top: 15px; font-weight: 500; }
        .class-text { color: #e2e8f0; font-size: 0.95rem; }
        .percent-text { color: #fbbf24; font-weight: bold; }

        .bar {
            height: 12px;
            margin-bottom: 15px;
            border-radius: 10px;
        }

        textarea.form-control {
            background: #0f172a;
            color: #38bdf8;
            border: 1px solid #334155;
            font-family: monospace;
        }

        textarea.form-control:focus {
            background: #0f172a;
            color: #38bdf8;
            border-color: #38bdf8;
            box-shadow: none;
        }

        .btn-info { color: white; }
    </style>
</head>

<body>

<div class="container">
    <h2 class="text-center mb-4">🧠 EEG AI Predictor</h2>

    <div class="card">

        <button class="btn btn-info mb-3" onclick="generateSample()">
            Generate Sample EEG
        </button>

        <textarea id="signal" class="form-control" rows="6"
            placeholder="Paste EEG values (space / comma / tab separated)"></textarea>

        <button class="btn btn-success mt-3 w-100 fw-bold" onclick="predict()">
            RUN PREDICTION
        </button>

        <div class="result-box" id="result"></div>

    </div>
</div>

<script>

/* =========================
   CLASS LABEL MAPPING
========================= */
const labelMap = {
    1: "Eyes Open",
    2: "Eyes Closed",
    3: "Non-Epileptic Zone",
    4: "Epileptic Zone",
    5: "Seizure"
};

/* =========================
   COLOR MAPPING
========================= */
function getColor(cls) {
    switch (cls) {
        case 1: return "#22c55e"; // green
        case 2: return "#38bdf8"; // blue
        case 3: return "#facc15"; // yellow
        case 4: return "#f97316"; // orange
        case 5: return "#ef4444"; // red
        default: return "#94a3b8";
    }
}

/* =========================
   GENERATE SAMPLE EEG
========================= */
function generateSample() {
    let sample = [];

    for (let i = 0; i < 4094; i++) {
        sample.push((Math.random() * 2 - 1) * (Math.sin(i / 30) + Math.random()));
    }

    document.getElementById("signal").value = sample.join(" ");
}

/* =========================
   PREDICT FUNCTION
========================= */
function predict() {
    let signalInput = document.getElementById("signal").value.trim();

    if (!signalInput) {
        alert("Please generate or paste EEG signal first!");
        return;
    }

    // convert input → number array
    let signal = signalInput
        .split(/[\s,]+/)
        .map(Number)
        .filter(x => !isNaN(x));

    if (signal.length === 0) {
        alert("Invalid signal format!");
        return;
    }

    document.getElementById("result").innerHTML =
        "<p class='text-info'>Analyzing EEG signal...</p>";

    fetch("/predict/", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "X-CSRFToken": getCSRFToken()
        },
        body: JSON.stringify({ signal: signal })
    })
    .then(res => res.json())
    .then(data => {

        if (data.error) {
            document.getElementById("result").innerHTML =
                `<span class="text-danger">${data.error}</span>`;
            return;
        }

        let html = `
            <h4 class="prediction-label">
                Prediction:
                <span class="text-warning">
                    ${labelMap[data.prediction] || "Unknown"}
                </span>
            </h4>

            <h5 class="confidence-label">Confidence Breakdown:</h5>
        `;

        data.probabilities.forEach(p => {
            let percent = (p.prob * 100).toFixed(2);

            html += `
                <div class="mb-1">
                    <div class="d-flex justify-content-between">
                        <span class="class-text">
                            ${labelMap[p.class] || ("Class " + p.class)}
                        </span>
                        <span class="percent-text">${percent}%</span>
                    </div>

                    <div class="bar" style="
                        width:${percent}%;
                        background:${getColor(p.class)};
                    "></div>
                </div>
            `;
        });

        document.getElementById("result").innerHTML = html;
    })
    .catch(err => {
        document.getElementById("result").innerHTML =
            `<span class="text-danger">Request failed: ${err.message}</span>`;
    });
}

/* =========================
   CSRF TOKEN
========================= */
function getCSRFToken() {
    let cookieValue = null;

    document.cookie.split(';').forEach(c => {
        let cookie = c.trim();
        if (cookie.startsWith('csrftoken=')) {
            cookieValue = cookie.substring('csrftoken='.length);
        }
    });

    return cookieValue;
}

</script>

</body>
</html>
