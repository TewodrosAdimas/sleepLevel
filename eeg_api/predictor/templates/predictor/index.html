<!DOCTYPE html>
<html>
<head>
    <title>EEG AI Predictor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0f172a; color: white; }
        .container { margin-top: 50px; }
        .card { background: #1e293b; border-radius: 15px; padding: 20px; border: 1px solid #334155; }
        
        /* Fixed styling for the result text */
        .result-box { 
            margin-top: 20px; 
            color: #f8fafc; /* Off-white for better readability */
        }
        .result-box h4 { color: #22c55e; } /* Green for the Prediction */
        .result-box h5 { color: #94a3b8; } /* Grey for "Confidence" */
        
        .bar { height: 20px; background: #38bdf8; margin-bottom: 10px; border-radius: 5px; }
        
        /* Make the textarea readable */
        textarea.form-control {
            background-color: #0f172a;
            color: #38bdf8;
            border: 1px solid #334155;
        }
        textarea.form-control:focus {
            background-color: #0f172a;
            color: #38bdf8;
        }
    </style>
</head>
<body>

<div class="container">
    <h2 class="text-center mb-4">🧠 EEG Sleep Level Predictor</h2>

    <div class="card shadow">
        <button class="btn btn-info mb-3 text-white" onclick="generateSample()">
            Generate Sample EEG
        </button>

        <textarea id="signal" class="form-control" rows="5"
            placeholder="Paste 4094 EEG values here..."></textarea>

        <button class="btn btn-success mt-3 w-100" onclick="predict()">
            Predict Sleep Level
        </button>

        <div class="result-box" id="result"></div>
    </div>
</div>

<script>
function generateSample() {
    let sample = Array.from({length: 4094}, () => Math.random().toFixed(4));
    document.getElementById("signal").value = JSON.stringify(sample);
}

function predict() {
    let signalInput = document.getElementById("signal").value;

    if (!signalInput) {
        alert("Please generate or paste EEG signal first!");
        return;
    }

    let signal;
    try {
        signal = JSON.parse(signalInput);
    } catch (e) {
        alert("Invalid JSON format.");
        return;
    }

    // Showing a loading state
    document.getElementById("result").innerHTML = "Computing prediction...";

    fetch("/predict/", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "X-CSRFToken": getCSRFToken()
        },
        body: JSON.stringify({signal: signal})
    })
    .then(res => {
        if (!res.ok) throw new Error("Server error: " + res.status);
        return res.json();
    })
    .then(data => {
        // We use Bootstrap classes like 'text-info' to ensure visibility
        let html = `<h4 class="mt-3">Prediction: <span class="text-warning">${data.prediction}</span></h4>
                    <h5 class="text-light">Confidence:</h5>`;
        
        data.probabilities.forEach(p => {
            let percent = (p.prob * 100).toFixed(2);
            html += `<div class="mb-2">
                        <div class="d-flex justify-content-between">
                            <span>Class ${p.class}</span>
                            <span>${percent}%</span>
                        </div>
                        <div class="bar" style="width:${percent}%"></div>
                     </div>`;
        });
        document.getElementById("result").innerHTML = html;
    })
    .catch(err => {
        console.error(err);
        document.getElementById("result").innerHTML = `<span class="text-danger">Error: ${err.message}</span>`;
    });
}

function getCSRFToken() {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
        document.cookie.split(';').forEach(c => {
            let cookie = c.trim();
            if (cookie.startsWith('csrftoken=')) {
                cookieValue = cookie.substring('csrftoken='.length);
            }
        });
    }
    return cookieValue;
}
</script>

</body>
</html>
